<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriMarket SL | Secure Market Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="navbar float-in">
        <div class="logo"><i class="fa-solid fa-leaf"></i> AgriMarket SL</div>
        <nav id="navMenu">
            </nav>
    </header>

    <div id="landingPage" class="hero full-screen float-in" style="animation-delay: 0.2s;">
        <div class="hero-content">
            <h1>Connecting Sierra Leone's Farmers to the World</h1>
            <p>You must be signed in to access real-time crop prices, contact local farmers, and view agricultural data.</p>
            <div class="auth-action-buttons">
                <button id="btnStartLogin" class="btn-blue btn-large"><i class="fa-solid fa-right-to-bracket"></i> Sign In</button>
                <button id="btnStartRegister" class="btn-green btn-large"><i class="fa-solid fa-user-plus"></i> Create Account</button>
            </div>
        </div>
    </div>

    <div id="dashboardApp" style="display: none;">
        <div class="dashboard-header float-in" style="animation-delay: 0.1s;">
            <div class="container">
                <section class="search-bar">
                    <div class="input-group">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="searchInput" placeholder="Search for Rice, Cocoa, Cassava...">
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-location-dot"></i>
                        <select id="locationFilter">
                            <option value="All">All Regions</option>
                            <option value="Bo">Bo</option>
                            <option value="Kenema">Kenema</option>
                            <option value="Makeni">Makeni</option>
                            <option value="Western Area">Western Area</option>
                        </select>
                    </div>
                    <button id="searchBtn" class="btn-blue">Filter Market</button>
                </section>
            </div>
        </div>

        <main class="container float-in" style="animation-delay: 0.3s;">
            <section class="listings">
                <div class="section-header">
                    <h2>Live Market Listings</h2>
                    <span id="resultCount" class="text-muted">Loading...</span>
                </div>
                <div id="cropCardsContainer" class="grid">
                    </div>
            </section>
        </main>
    </div>

    <div id="authModal" class="modal-overlay">
        <div class="modal-content float-in">
            <button class="close-btn" id="closeModal"><i class="fa-solid fa-xmark"></i></button>
            
            <div class="auth-tabs">
                <button class="tab-btn active" id="tabLogin">Sign In</button>
                <button class="tab-btn" id="tabRegister">Create Account</button>
            </div>

            <form id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="e.g., trader@freetown.sl" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="btn-full btn-blue">Sign In</button>
            </form>

            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" placeholder="Musa Kamara" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" required>
                </div>
                <button type="submit" class="btn-full btn-green">Create Account</button>
            </form>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
