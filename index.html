<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriMarket SL - Farmer-to-Market Platform</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">AgriMarket SL 🌾</div>
        <nav>
            <a href="#market">Market</a>
            <a href="#weather">Weather</a>
            <a href="#profile">Profile</a>
        </nav>
    </header>

    <main class="container">
        <section class="search-bar">
            <input type="text" id="searchInput" placeholder="Search for Rice, Cassava, Cocoa...">
            <select id="locationFilter">
                <option value="All">All Regions</option>
                <option value="Bo">Bo</option>
                <option value="Kenema">Kenema</option>
                <option value="Makeni">Makeni</option>
                <option value="Western Area">Western Area</option>
            </select>
            <button id="searchBtn">Find Crops</button>
        </section>

        <section class="listings">
            <h2>Current Market Listings</h2>
            <div id="cropCardsContainer" class="grid">
                </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
