function randomItem(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function randomPhone(){
    return "+2327" + Math.floor(1000000 + Math.random()*9000000);
}

function randomPrice(base){
    return base + Math.floor(Math.random()*150 - 75);
}

async function seedDatabase(){

    for(let i=1;i<=100;i++){

        const crop=randomItem(cropTypes);

        await addDoc(collection(db,"crops"),{

            name:crop.name,
            name_lower:crop.name.toLowerCase(),
            category:crop.category,
            location:randomItem(districts),
            price:randomPrice(crop.basePrice),
            farmer_name:randomItem(firstNames)+" "+randomItem(lastNames),
            phone:randomPhone(),
            quantity:(10+Math.floor(Math.random()*190))+" bags",
            unit:"bag",
            available:true,
            image_url:crop.image,
            description:"Fresh farm produce harvested in Sierra Leone.",
            created_at:serverTimestamp()

        });

        console.log(i+"/100 added");
    }

    alert("100 crop listings added successfully!");
}
